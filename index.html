<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,400;0,600&display=swap"
      rel="stylesheet"
    />
    <link href="./CSS/output.css" rel="stylesheet" />
    <title>Clipboard</title>
  </head>
  <body
    class="font-sans min-h-screen bg-header-mobile bg-no-repeat bg-contain md:bg-header-desktop"
  >
    <section id="hero">
      <div class="section-container">
        <img src="./images/logo.svg" alt="" class="mx-auto my-16" />
        <h1 class="text-4xl text-bold mb-6 text-dark-grayish-blue">
          A history of everything you copy
        </h1>
        <p class="text-grayish-blue mb-10 max-w-3xl mx-auto">
          Clipboard allows you to track and organize you copy. Instantly access
          your clipboard on all your devices.
        </p>
        <div class="flex flex-col md:flex-row justify-center gap-4">
          <button
            class="bg-strong-cyan text-white px-6 py-3 rounded-full shadow-lg shadow-strong-cyan/50 hover:opacity-80 transition-all duration-300"
          >
            Download for iOS
          </button>
          <button
            class="bg-light-blue text-white px-6 py-3 rounded-full shadow-lg shadow-light-blue/50 hover:opacity-80 transition-all duration-300"
          >
            Download for Android
          </button>
        </div>
      </div>
    </section>
  </body>
</html>
